<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动 - 武器TTK/DPS查询系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- SheetJS CDN 稳定国内+Github可用 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        accent: '#722ED1',
                        dark: '#1D2129',
                        light: '#F2F3F5'
                    }
                }
            }
        }
    </script>
    <style>
        .sortable:hover { cursor: pointer; background: rgba(22,93,255,0.05); }
        .table-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <i class="fa fa-crosshairs text-primary text-3xl mr-3"></i>
                <h1 class="text-2xl font-bold text-dark">三角洲行动 武器查询系统</h1>
            </div>
            <div class="text-sm text-gray-500">
                <span id="weapon-count" class="font-bold text-primary">0</span> 条武器数据
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <input id="search-input" type="text" placeholder="搜索武器名称、伤害、TTK..." 
            class="w-full px-4 py-3 rounded border focus:border-primary outline-none">
        </div>

        <div class="bg-white rounded-lg table-shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full min-w-[1200px]">
                    <thead class="bg-primary text-white">
                        <tr>
                            <th class="p-4 text-left sortable">武器名字</th>
                            <th class="p-4 text-right sortable">单发甲伤</th>
                            <th class="p-4 text-right sortable">单发肉伤</th>
                            <th class="p-4 text-right sortable">射速(RPM)</th>
                            <th class="p-4 text-right sortable">秒甲伤</th>
                            <th class="p-4 text-right sortable">秒肉伤</th>
                            <th class="p-4 text-right sortable">甲伤TTK(秒)</th>
                            <th class="p-4 text-right sortable">肉伤TTK(秒)</th>
                            <th class="p-4 text-right sortable">综合DPS</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="9" class="p-16 text-center text-gray-400">正在从服务器加载 data.xlsx 数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
let weaponData = [];

// Github Pages 专用加载逻辑
async function loadExcel() {
    try {
        // 兼容相对路径，Github Pages 100%正常访问
        const resp = await fetch('./data.xlsx');
        if(!resp.ok) throw new Error("文件找不到，请确认data.xlsx在仓库根目录");

        const buf = await resp.arrayBuffer();
        const workbook = XLSX.read(buf, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        weaponData = XLSX.utils.sheet_to_json(sheet);

        renderTable(weaponData);
        updateCount();
    } catch (e) {
        console.error(e);
        document.getElementById('table-body').innerHTML = 
        `<tr class="text-red-500"><td colspan="9" class="p-16 text-center">
            数据加载失败<br>
            1. 确认仓库根目录有 data.xlsx<br>
            2. 表头和代码字段完全一致<br>
            3. 等待Github Pages缓存刷新
        </td></tr>`;
    }
}

function renderTable(list){
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    list.forEach(item=>{
        tbody.innerHTML += `
        <tr class="border-b hover:bg-gray-50">
            <td class="p-3 font-medium">${item['武器名字']||'-'}</td>
            <td class="p-3 text-right">${item['武器单发甲伤']||0}</td>
            <td class="p-3 text-right">${item['武器单发肉伤']||0}</td>
            <td class="p-3 text-right">${item['射速（RPM）']||0}</td>
            <td class="p-3 text-right">${Number(item['秒甲伤']||0).toFixed(2)}</td>
            <td class="p-3 text-right">${Number(item['秒肉伤']||0).toFixed(2)}</td>
            <td class="p-3 text-right">${Number(item['甲伤TTK（秒）']||0).toFixed(2)}</td>
            <td class="p-3 text-right">${Number(item['肉伤TTK（秒）']||0).toFixed(2)}</td>
            <td class="p-3 text-right font-bold text-primary">${Number(item['综合DPS']||0).toFixed(2)}</td>
        </tr>`
    })
}

function updateCount(){
    document.getElementById('weapon-count').innerText = weaponData.length;
}

// 搜索
document.getElementById('search-input').addEventListener('input', e=>{
    const kw = e.target.value.toLowerCase();
    const filter = weaponData.filter(i=>JSON.stringify(i).toLowerCase().includes(kw));
    renderTable(filter);
})

window.onload = loadExcel;
</script>
</body>
</html>
