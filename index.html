<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动 - 武器TTK/DPS查询系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        accent: '#722ED1',
                        dark: '#1D2129',
                        light: '#F2F3F5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .table-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }
            .search-focus {
                box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.2);
            }
            .sortable:hover {
                cursor: pointer;
                background-color: rgba(22, 93, 255, 0.05);
            }
            .sort-indicator {
                transition: transform 0.2s ease;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center mb-4 md:mb-0">
                <i class="fa fa-crosshairs text-primary text-3xl mr-3"></i>
                <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-dark">
                    三角洲行动<span class="text-primary">武器查询系统</span>
                </h1>
            </div>
            <div class="text-sm text-gray-500">
                <span id="weapon-count" class="font-medium text-primary"></span> 把武器数据 | 实时搜索 & 排序
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 搜索区域 -->
        <div class="mb-8 bg-white p-6 rounded-lg shadow-md">
            <div class="flex flex-col md:flex-row items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-dark mb-4 md:mb-0">
                    <i class="fa fa-search text-primary mr-2"></i>武器搜索
                </h2>
                <div class="text-sm text-gray-500">
                    提示：可搜索武器名称、伤害值、射速、TTK等任意数据
                </div>
            </div>
            
            <div class="relative">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="输入搜索关键词... 例如：AKM、0.25、400" 
                    class="w-full px-4 py-3 pl-10 rounded-lg border border-gray-300 focus:border-primary focus:outline-none focus:search-focus transition-all duration-200 text-lg"
                >
                <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
                <button 
                    id="clear-search" 
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden"
                >
                    <i class="fa fa-times-circle text-xl"></i>
                </button>
            </div>
            
            <div id="search-results" class="mt-4 text-sm text-gray-600 hidden">
                <i class="fa fa-info-circle text-primary mr-2"></i>
                找到 <span id="match-count" class="font-bold text-primary"></span> 个匹配结果
            </div>
        </div>

        <!-- 表格区域 -->
        <div class="bg-white rounded-lg overflow-hidden table-shadow">
            <div class="overflow-x-auto">
                <table class="w-full min-w-[1200px]">
                    <thead>
                        <tr class="bg-primary text-white">
                            <th class="px-4 py-4 text-left sortable" data-col="武器名字">
                                武器名字 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="武器单发甲伤">
                                单发甲伤 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="武器单发肉伤">
                                单发肉伤 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="射速（RPM）">
                                射速(RPM) 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="秒甲伤">
                                秒甲伤 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="秒肉伤">
                                秒肉伤 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="甲伤TTK（秒）">
                                甲伤TTK(秒) 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="肉伤TTK（秒）">
                                肉伤TTK(秒) 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                            <th class="px-4 py-4 text-right sortable" data-col="综合DPS">
                                综合DPS 
                                <i class="fa fa-sort sort-indicator ml-1"></i>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="weapon-table-body">
                        <!-- 武器数据将通过JavaScript动态插入 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 无数据提示 -->
            <div id="no-data" class="py-16 text-center hidden">
                <i class="fa fa-search-minus text-gray-300 text-5xl mb-4"></i>
                <p class="text-gray-500 text-lg">未找到匹配的武器数据</p>
                <button id="reset-search" class="mt-4 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">
                    重置搜索
                </button>
            </div>
        </div>

        <!-- 数据统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <div class="flex items-center mb-2">
                    <i class="fa fa-bar-chart text-primary text-2xl mr-3"></i>
                    <h3 class="text-lg font-semibold text-dark">最高DPS武器</h3>
                </div>
                <p id="max-dps-weapon" class="text-gray-600"></p>
                <p class="text-2xl font-bold text-primary mt-2" id="max-dps-value"></p>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-md">
                <div class="flex items-center mb-2">
                    <i class="fa fa-bolt text-accent text-2xl mr-3"></i>
                    <h3 class="text-lg font-semibold text-dark">最快击杀武器</h3>
                </div>
                <p id="fastest-ttk-weapon" class="text-gray-600"></p>
                <p class="text-2xl font-bold text-accent mt-2" id="fastest-ttk-value"></p>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-md">
                <div class="flex items-center mb-2">
                    <i class="fa fa-tachometer text-secondary text-2xl mr-3"></i>
                    <h3 class="text-lg font-semibold text-dark">最高射速武器</h3>
                </div>
                <p id="max-rpm-weapon" class="text-gray-600"></p>
                <p class="text-2xl font-bold text-secondary mt-2" id="max-rpm-value"></p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-dark text-white mt-12 py-8">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-2">三角洲行动 - 武器TTK/DPS查询系统</p>
            <p class="text-gray-400 text-sm">数据来源：三角洲行动 | 共 <span id="footer-weapon-count"></span> 把武器数据</p>
        </div>
    </footer>

                    <td class="px-4 py-3 border-b border-gray-200 text-right">${formatNumber(weapon['肉伤TTK（秒）'])}</td>
                    <td class="px-4 py-3 border-b border-gray-200 text-right font-medium text-primary">${formatNumber(weapon['综合DPS'])}</td>
                `;
                
                weaponTableBody.appendChild(row);
            });
        }

        // 处理搜索
        function handleSearch() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            
            // 显示/隐藏清除按钮
            if (searchTerm) {
                clearSearchBtn.classList.remove('hidden');
            } else {
                clearSearchBtn.classList.add('hidden');
                renderTable(weaponData);
                return;
            }
            
            // 筛选数据
            const filteredData = weaponData.filter(weapon => {
                // 检查所有属性是否包含搜索词
                return Object.values(weapon).some(value => {
                    if (value === null || value === undefined) return false;
                    return value.toString().toLowerCase().includes(searchTerm);
                });
            });
            
            // 重新渲染表格
            renderTable(filteredData);
            
            // 重新计算统计数据（基于筛选后的数据）
            if (filteredData.length > 0) {
                calculateStats(filteredData);
            }
        }

        // 清除搜索
        function clearSearch() {
            searchInput.value = '';
            clearSearchBtn.classList.add('hidden');
            renderTable(weaponData);
            calculateStats();
            searchInput.focus();
        }

        // 处理排序
        function handleSort(e) {
            const header = e.currentTarget;
            const column = header.getAttribute('data-col');
            
            // 更新排序状态
            if (sortState.column === column) {
                // 同一列，切换排序方向
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                // 不同列，默认升序
                sortState.column = column;
                sortState.direction = 'asc';
            }
            
            // 更新排序图标
            updateSortIcons();
            
            // 排序数据
            const sortedData = [...weaponData].sort((a, b) => {
                let valueA = a[column];
                let valueB = b[column];
                
                // 处理数值比较
                if (!isNaN(parseFloat(valueA)) && !isNaN(parseFloat(valueB))) {
                    valueA = parseFloat(valueA);
                    valueB = parseFloat(valueB);
                }
                
                // 字符串比较
                if (typeof valueA === 'string' && typeof valueB === 'string') {
                    return sortState.direction === 'asc' 
                        ? valueA.localeCompare(valueB) 
                        : valueB.localeCompare(valueA);
                }
                
                // 数值比较
                return sortState.direction === 'asc' 
                    ? valueA - valueB 
                    : valueB - valueA;
            });
            
            // 重新渲染表格
            renderTable(sortedData);
        }

        // 更新排序图标
        function updateSortIcons() {
            // 重置所有图标
            document.querySelectorAll('.sort-indicator').forEach(icon => {
                icon.className = 'fa fa-sort sort-indicator ml-1';
            });
            
            // 更新当前排序列的图标
            if (sortState.column) {
                const currentHeader = document.querySelector(`.sortable[data-col="${sortState.column}"] .sort-indicator`);
                if (currentHeader) {
                    currentHeader.className = `fa fa-sort-${sortState.direction} sort-indicator ml-1`;
                }
            }
        }

        // 计算统计数据
        function calculateStats(data = weaponData) {
            if (data.length === 0) return;
            
            // 最高DPS
            const maxDpsWeapon = data.reduce((max, weapon) => {
                const dps = parseFloat(weapon['综合DPS']) || 0;
                const maxDps = parseFloat(max['综合DPS']) || 0;
                return dps > maxDps ? weapon : max;
            }, data[0]);
            
            // 最快击杀（肉伤TTK最小）
            const fastestTtkWeapon = data.reduce((min, weapon) => {
                const ttk = parseFloat(weapon['肉伤TTK（秒）']) || Infinity;
                const minTtk = parseFloat(min['肉伤TTK（秒）']) || Infinity;
                return ttk < minTtk ? weapon : min;
            }, data[0]);
            
            // 最高射速
            const maxRpmWeapon = data.reduce((max, weapon) => {
                const rpm = parseFloat(weapon['射速（RPM）']) || 0;
                const maxRpm = parseFloat(max['射速（RPM）']) || 0;
                return rpm > maxRpm ? weapon : max;
            }, data[0]);
            
            // 更新统计显示
            maxDpsWeaponEl.textContent = maxDpsWeapon['武器名字'];
            maxDpsValueEl.textContent = parseFloat(maxDpsWeapon['综合DPS']).toFixed(2);
            
            fastestTtkWeaponEl.textContent = fastestTtkWeapon['武器名字'];
            fastestTtkValueEl.textContent = parseFloat(fastestTtkWeapon['肉伤TTK（秒）']).toFixed(3) + ' 秒';
            
            maxRpmWeaponEl.textContent = maxRpmWeapon['武器名字'];
            maxRpmValueEl.textContent = parseFloat(maxRpmWeapon['射速（RPM）']).toFixed(0) + ' RPM';
        }
    </script>
</body>
</html>
